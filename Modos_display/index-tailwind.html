<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body>
    <h1>Inline:</h1>
    <div class="inline bg-gray-600 text-white">
        Productos
    </div>
    <div class="inline bg-sky-600 text-white">
        Nosotros
    </div>
    <div class="inline bg-rose-600 text-white">
        Servicios
    </div>
    <div class="inline bg-yellow-300 text-white">
        Contacto
    </div>
    <hr>

    <h1>Block:</h1>
    <div class="block bg-teal-200 text-yellow-600 w-[200px] h-[100px]">
        Productos
    </div>
    <div class="block bg-teal-300 text-yellow-600 w-[200px] h-[100px]">
        Nosotros
    </div>
    <div class="block bg-teal-400 text-yellow-600 w-[200px] h-[100px]">
        Servicios
    </div>
    <div class="block bg-teal-500 text-yellow-600 w-[200px] h-[100px]">
        Contacto
    </div>
</html>
