<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: #DEDFE1;
        }
        .main{
            background-color: white;
            width: 500px;
            height: 200px;
            margin: 50px auto;

        }
        .company-name{
            width: auto;
            height: 100px;
            background-color: #3E3E40;
            color: white;
        }
        .flag{
            width: auto;
            height: 50px;
            background-color: #76C4C1;
        }
        .portrait{
            width: 500px;
            height: 600px;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="company-name"></div>
        <div class="flag"></div>
        <div>
            <img src="retrato.jpg" alt="" class="portrait">
        </div>
    </div>
</body>
</html>
